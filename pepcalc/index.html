<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/pepcalc/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/pepcalc/icons/icon-192.png" />
    <link rel="manifest" href="/pepcalc/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>PepCalc</title>
    <script type="module" crossorigin src="/pepcalc/assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="/pepcalc/assets/index.css">
  </head>
  <body class="min-h-dvh bg-background text-foreground flex justify-center items-start">
    <main id="app" class="w-full max-w-sm px-4 py-8 flex flex-col gap-3">

      <!-- Header -->
      <header class="px-1 pb-1">
        <h1 class="text-2xl font-bold tracking-tight text-accent">PepCalc</h1>
        <p class="text-sm text-muted-foreground mt-0.5">Peptide dilution calculator</p>
      </header>

      <!-- Input Card -->
      <section
        class="rounded-xl border border-border bg-card shadow-sm p-5 flex flex-col gap-4"
        aria-label="Calculator inputs"
      >

        <!-- Dose -->
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <label for="dose-input" class="text-sm font-medium leading-none">Dose</label>
            <div
              class="inline-flex h-7 items-center rounded-md border border-border bg-background p-0.5 gap-px"
              role="group"
              aria-label="Dose unit"
            >
              <button
                type="button"
                id="unit-mcg"
                class="toggle-btn h-full px-2.5 rounded-[3px] text-xs font-medium text-muted-foreground active"
                aria-pressed="true"
              >mcg</button>
              <button
                type="button"
                id="unit-mg"
                class="toggle-btn h-full px-2.5 rounded-[3px] text-xs font-medium text-muted-foreground"
                aria-pressed="false"
              >mg</button>
            </div>
          </div>
          <input
            type="number"
            id="dose-input"
            class="h-10 w-full rounded-md border border-input bg-background px-3 text-sm text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring transition-shadow"
            inputmode="decimal"
            min="0"
            step="any"
            placeholder="0"
            aria-label="Dose amount"
          />
        </div>

        <!-- Vial Size -->
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <label for="vial-input" class="text-sm font-medium leading-none">Vial Size</label>
            <span class="text-xs font-medium text-muted-foreground">mg</span>
          </div>
          <input
            type="number"
            id="vial-input"
            class="h-10 w-full rounded-md border border-input bg-background px-3 text-sm text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring transition-shadow"
            inputmode="decimal"
            min="0"
            step="any"
            placeholder="0"
            aria-label="Vial size in milligrams"
          />
        </div>

        <!-- Bac Water -->
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <label for="water-input" class="text-sm font-medium leading-none">Bac Water</label>
            <span class="text-xs font-medium text-muted-foreground">mL</span>
          </div>
          <input
            type="number"
            id="water-input"
            class="h-10 w-full rounded-md border border-input bg-background px-3 text-sm text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring transition-shadow"
            inputmode="decimal"
            min="0"
            step="any"
            placeholder="0"
            aria-label="Bacteriostatic water in milliliters"
          />
        </div>

      </section>

      <!-- Result Card -->
      <section
        class="rounded-xl border border-accent-muted bg-accent-surface shadow-sm py-8 px-5 flex flex-col items-center gap-1.5"
        aria-label="Calculation result"
        aria-live="polite"
      >
        <div class="flex items-baseline gap-2">
          <span id="result-units" class="text-6xl font-bold tracking-tight leading-none tabular-nums text-accent">&#x2014;</span>
          <span class="text-xl font-semibold text-muted-foreground">units</span>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span id="result-ml" class="text-xl font-semibold tabular-nums text-muted-foreground">&#x2014;</span>
          <span class="text-sm font-medium text-muted-foreground">mL</span>
        </div>
      </section>

    </main>

  </body>
</html>
